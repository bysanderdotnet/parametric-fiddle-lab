# Human-owned: AI agents must never edit this file.
# When the project needs a toolchain before ./AGENTS.sh ci can run the
# registered commands (e.g. actions/setup-node + npm ci), a human adds
# those steps below.
name: agents

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Superseded runs on the same branch/PR are wasted minutes; cancel them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # raise if builds are slow
    steps:
      - uses: actions/checkout@v4

      - name: Harness gates
        # check always; init + verify once guided setup is complete.
        run: ./AGENTS.sh ci
